# ═══════════════════════════════════════════════════
# EquationAI — Docker Compose
# ═══════════════════════════════════════════════════

version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: equationai-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - FASTAPI_ENV=${FASTAPI_ENV:-production}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./equations.db}
      - SECRET_KEY=${SECRET_KEY:-change-this-secret}
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
      - ./logs:/app/logs
      - equation_db:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  equation_db:
